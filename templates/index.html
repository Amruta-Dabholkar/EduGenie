<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>EduGenie – Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #060D1F;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 70% 60% at 80% 20%, rgba(37,99,235,.20) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 10% 80%, rgba(30,58,138,.25) 0%, transparent 55%);
            pointer-events: none;
        }
        .card {
            position: relative; z-index: 1;
            background: rgba(11,21,48,.88);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(37,99,235,.25);
            border-radius: 24px; padding: 2.5rem; width: 100%; max-width: 420px;
            box-shadow: 0 24px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.04);
        }
        .logo { text-align: center; margin-bottom: 1.8rem; }
        .logo .icon { font-size: 3rem; margin-bottom: .4rem; }
        .logo h1 {
            font-family: 'Sora', sans-serif; font-size: 1.7rem; font-weight: 800;
            background: linear-gradient(90deg, #22D3EE, #3B82F6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .logo p { color: rgba(255,255,255,.50); font-size: .88rem; margin-top: .3rem; }

        .tabs {
            display: flex; background: rgba(255,255,255,.05);
            border-radius: 12px; padding: 4px; margin-bottom: 1.75rem;
            border: 1px solid rgba(255,255,255,.08);
        }
        .tab {
            flex: 1; padding: .55rem; border: none; border-radius: 9px;
            background: transparent; cursor: pointer;
            font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: .9rem;
            color: rgba(255,255,255,.45); transition: all .2s;
        }
        .tab.active { background: #1E3A8A; color: #fff; box-shadow: 0 2px 10px rgba(30,58,138,.5); }

        .form-group { margin-bottom: 1rem; }
        .form-group label {
            display: block; font-size: .78rem; font-weight: 600;
            color: rgba(255,255,255,.5); margin-bottom: .4rem;
            text-transform: uppercase; letter-spacing: .6px;
        }
        .form-group input, .form-group select {
            width: 100%; padding: .75rem 1rem;
            border: 1.5px solid rgba(255,255,255,.1); border-radius: 12px;
            font-family: 'DM Sans', sans-serif; font-size: .95rem;
            color: #fff; background: rgba(255,255,255,.06);
            transition: border-color .2s, box-shadow .2s; outline: none;
        }
        .form-group input::placeholder { color: rgba(255,255,255,.3); }
        .form-group input:focus, .form-group select:focus {
            border-color: #2563EB; box-shadow: 0 0 0 3px rgba(37,99,235,.2);
        }
        .form-group select option { background: #0F2050; color: #fff; }

        .btn {
            width: 100%; padding: .8rem; border: none; border-radius: 12px;
            font-family: 'DM Sans', sans-serif; font-size: .95rem; font-weight: 700;
            cursor: pointer; transition: all .2s;
            background: linear-gradient(135deg, #1E3A8A, #2563EB); color: #fff;
            margin-top: .25rem;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,.5); }

        .error-msg {
            color: #FCA5A5; font-size: .83rem; margin-bottom: .75rem;
            padding: .5rem .75rem; background: rgba(239,68,68,.12);
            border-radius: 8px; border: 1px solid rgba(239,68,68,.2);
        }
        .back { display: block; text-align: center; margin-top: 1.2rem; color: rgba(255,255,255,.35); font-size: .83rem; text-decoration: none; transition: color .2s; }
        .back:hover { color: rgba(255,255,255,.7); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="icon">🧞</div>
        <h1>EduGenie</h1>
        <p>Your Intelligent Study Companion</p>
    </div>

    <div class="tabs">
        <button class="tab active" id="loginTab" onclick="showTab('login')">Login</button>
        <button class="tab"        id="regTab"   onclick="showTab('register')">Register</button>
    </div>

    <!-- LOGIN -->
    <div id="loginForm">
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="loginUsername" placeholder="Enter username" />
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter password"
                   onkeydown="if(event.key==='Enter') handleLogin()" />
        </div>
        <div id="loginError" class="error-msg hidden"></div>
        <button class="btn" onclick="handleLogin()">Login →</button>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" class="hidden">
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="regUsername" placeholder="Choose a username" />
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="regPassword" placeholder="At least 6 characters"
                   onkeydown="if(event.key==='Enter') handleRegister()" />
        </div>
        <div class="form-group">
            <label>Role</label>
            <select id="regRole">
                <option value="student">Student</option>
                <option value="teacher">Teacher</option>
            </select>
        </div>
        <div id="regError" class="error-msg hidden"></div>
        <button class="btn" onclick="handleRegister()">Create Account →</button>
    </div>

    <a href="/" class="back">← Back to Home</a>
</div>

<script src="/static/js/script.js"></script>
</body>
</html>
